<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Match It — Findings & Diagnoses</title>
<link rel="manifest" href="../manifest.webmanifest">
<meta name="theme-color" content="#0b3a52">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Match It">
<link rel="apple-touch-icon" href="../apple-touch-icon.png">
<style>
:root{--bg:#0c0f15;--panel:#141925;--bdr:#27303f;--tx:#e6eaf2;--tx2:#aab4c5;--tx3:#7c8699;--teal:#5fc6e6;--green:#79d49b;--red:#e2737a;--amber:#f3ad63;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{background:var(--bg);color-scheme:dark}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--tx);font-size:17px;min-height:100vh}
.wrap{max-width:760px;margin:0 auto;padding:0 18px}
button{font-family:inherit;cursor:pointer}
a{color:var(--teal);text-decoration:none}
.bar{position:sticky;top:0;z-index:10;background:rgba(12,15,21,.94);backdrop-filter:blur(10px);border-bottom:1px solid var(--bdr);padding:8px 0;padding-top:calc(8px + env(safe-area-inset-top,0px))}
.bar .wrap{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.bar .title{font-weight:800;color:#fff;font-size:16px;margin-right:auto}
.bar .home{font-size:13px;color:var(--tx2);border:1px solid var(--bdr);border-radius:999px;padding:4px 11px;background:#0d1a26}
h1{font-size:24px;color:#fff;margin:22px 0 6px}
.lede{color:var(--tx2);font-size:15px;margin-bottom:16px;line-height:1.5}
.section-label{font-size:12px;text-transform:uppercase;letter-spacing:1.2px;color:var(--tx3);font-weight:800;margin:18px 0 9px}
.chiprow{display:flex;flex-wrap:wrap;gap:7px}
.chip{border:1px solid var(--bdr);background:#0d1a26;color:var(--tx2);border-radius:999px;padding:6px 13px;font-size:13.5px;font-weight:600}
.chip.sel{border-color:var(--teal);background:rgba(95,198,230,.16);color:#cdeffb}
.startbtn{display:block;width:100%;margin:18px 0 8px;padding:15px;border:none;border-radius:12px;background:linear-gradient(135deg,#11556f,#0b3a52);border:1px solid #2c6b86;color:#eaf8ff;font-size:17px;font-weight:800}
.hint{color:var(--tx3);font-size:12.5px;text-align:center;margin-top:6px}
.mtop{display:flex;align-items:center;gap:10px;margin:14px 0 12px;font-size:13px;color:var(--tx3)}
.mtop .t{margin-left:auto;font-weight:700;color:var(--tx2)}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.col h3{font-size:11.5px;text-transform:uppercase;letter-spacing:1px;color:var(--tx3);font-weight:800;margin-bottom:8px}
.item{display:block;width:100%;text-align:left;border:1px solid var(--bdr);background:#0d141f;border-radius:10px;padding:11px 12px;margin-bottom:9px;color:var(--tx);font-size:13.5px;line-height:1.4;transition:transform .08s,border-color .12s,background .12s}
.item.sel{border-color:var(--teal);background:rgba(95,198,230,.16)}
.item.done{border-color:var(--green);background:rgba(121,212,155,.12);color:var(--tx2);opacity:.6;pointer-events:none}
.item.bad{border-color:var(--red);background:rgba(226,115,122,.16);animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.dx{font-weight:700;font-size:14px}
.summary{text-align:center;padding:30px 10px}
.summary .em{font-size:48px}.summary h2{color:#fff;font-size:24px;margin:8px 0}
.summary .grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin:18px 0}
.summary .cell{background:var(--panel);border:1px solid var(--bdr);border-radius:11px;padding:14px}
.summary .cell .n{font-size:26px;font-weight:800;color:#fff}.summary .cell .l{font-size:12px;color:var(--tx3);text-transform:uppercase;letter-spacing:1px}
.row{display:flex;gap:10px;margin-top:14px}
.btn{flex:1;padding:13px;border:none;border-radius:11px;font-size:16px;font-weight:800}
.btn.primary{background:linear-gradient(135deg,#11556f,#0b3a52);border:1px solid #2c6b86;color:#eaf8ff}
.btn.ghost{background:#0d141f;border:1px solid var(--bdr);color:var(--tx2)}
.hidden{display:none}
</style>
</head>
<body>
<div class="bar"><div class="wrap">
  <span class="title">🧩 Match It</span>
  <a class="home" href="diagnose.html">🔎 Diagnose</a>
  <a class="home" href="flash.html">🃏 Flashcards</a>
  <a class="home" href="index.html">Trainer</a>
</div></div>

<main class="wrap">
<section id="start">
  <h1>Match findings to diagnoses</h1>
  <p class="lede">Tap a findings snippet, then the diagnosis it belongs to. Correct pairs lock in green. Beat the clock with no mistakes.</p>
  <div class="section-label">Region</div>
  <div class="chiprow" id="topics"></div>
  <div class="section-label">Pairs per round</div>
  <div class="chiprow" id="sizes">
    <button class="chip" data-size="4">4</button>
    <button class="chip sel" data-size="5">5</button>
    <button class="chip" data-size="6">6</button>
  </div>
  <button class="startbtn" id="startbtn">Start</button>
  <p class="hint" id="countnote"></p>
</section>

<section id="game" class="hidden">
  <div class="mtop"><span id="gprog"></span><span id="gmiss"></span><span class="t" id="gtimer">0:00</span></div>
  <div class="cols">
    <div class="col"><h3>Findings</h3><div id="left"></div></div>
    <div class="col"><h3>Diagnosis</h3><div id="right"></div></div>
  </div>
</section>

<section id="summary" class="hidden"></section>
</main>

<script src="flashcards.js"></script>
<script src="describe-cards.js"></script>
<script src="match.js"></script>
<script src="firebase-config.js"></script>
<script src="sync.js"></script>
<script>if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('../sw.js').catch(function(){});});}</script>
</body>
</html>
